<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - BrewRoute Coffee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">BrewRoute</div>
            <button class="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="order.html">Order Now</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="menu-page-hero">
            <h1>Our Menu</h1>
            <p>All drinks made with ethically sourced beans</p>
            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="hot">Hot Drinks</button>
                <button class="filter-btn" data-category="cold">Cold Drinks</button>
                <button class="filter-btn" data-category="drip">Drip Coffee</button>
            </div>
        </section>

        <section class="full-menu">
            <div id="menu-container" class="menu-items"></div>
        </section>

        <section class="menu-cta">
            <h2>Ready to order?</h2>
            <a href="order.html" class="btn-primary">Start Your Order</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 BrewRoute Coffee. Downtown Ottawa.</p>
    </footer>

    <button id="back-to-top" aria-label="Back to top">↑</button>

    <script src="script.js"></script>
</body>
</html>
